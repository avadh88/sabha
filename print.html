<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <title>Sabha PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans Gujarati', 'Noto Sans', sans-serif;
      background: #fff;
      color: #1a1a1a;
      padding: 0;
    }

    /* ── Screen wrapper ── */
    .page-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 24px 40px;
    }

    /* ── Top bar (no-print) ── */
    .top-bar {
      background: #8B0000;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .top-bar a {
      color: #ffd0d0;
      text-decoration: none;
      font-size: 12px;
    }
    .print-btn {
      background: #fff;
      color: #8B0000;
      border: none;
      border-radius: 5px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .print-btn:hover { background: #f5e8e8; }

    /* ── Sabha Document ── */
    .sabha-doc {
      padding: 14px 10px 20px;
    }

    /* Organization title */
    .sabha-title-block {
      text-align: center;
      margin-bottom: 8px;
    }
    .sabha-org-name {
      font-size: 20px;
      font-weight: 700;
      color: #8B0000;
      line-height: 1.3;
    }
    .sabha-org-subtitle {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 2px;
    }

    /* Date / Time line */
    .sabha-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0 6px;
      margin: 8px 0 10px;
      font-size: 13px;
      font-weight: 600;
    }
    .sabha-meta-key  { white-space: nowrap; }
    .sabha-meta-val  { }

    /* Main table */
    .sabha-table {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #888;
      font-size: 12px;
      table-layout: fixed;
    }

    /* Column widths */
    .col-kram  { width: 6%; }
    .col-time  { width: 18%; }
    .col-kary  { width: 13%; }
    .col-vigat { width: 46%; }
    .col-nam   { width: 17%; }

    /* Header row */
    .sabha-table thead .header-row th {
      background: #8B0000;
      color: #ffffff;
      font-weight: 700;
      padding: 7px 5px;
      text-align: center;
      border: 1px solid #7a0000;
      font-size: 12px;
    }

    /* Sabha Kram merged row */
    .kram-merged-row td {
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      padding: 6px 5px;
      background: #fff8f0;
      border: 1px solid #ccc;
      color: #1a1a1a;
    }

    /* Body rows */
    .sabha-table tbody tr td {
      padding: 6px 5px;
      vertical-align: top;
      border: 1px solid #bbb;
      line-height: 1.55;
    }

    .row-even td { background: #ffffff; }
    .row-odd  td { background: #fdf8f3; }

    /* Column-specific styles */
    .td-kram {
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      vertical-align: middle !important;
    }
    .td-time {
      text-align: center;
      color: #8B0000;
      font-weight: 600;
      font-size: 11.5px;
      vertical-align: middle !important;
    }
    .td-karyakram {
      color: #8B0000;
      font-weight: 700;
      font-size: 12px;
      text-align: center;
      vertical-align: middle !important;
    }
    .td-vigat {
      font-size: 11.5px;
      line-height: 1.6;
    }
    .td-nam {
      font-size: 11.5px;
      text-align: center;
      vertical-align: middle !important;
    }

    /* Footer row */
    .footer-row td {
      border: 1.5px solid #888;
      padding: 7px 8px;
      font-size: 12px;
      background: #fff;
    }
    .footer-label {
      font-weight: 700;
      text-align: center;
    }
    .footer-pravakta {
      font-weight: 600;
      color: #8B0000;
    }
    .footer-note-text {
      color: #555;
      font-size: 11px;
    }

    /* Brahmavidhya section */
    .bv-section {
      margin-top: 14px;
      border: 1.5px solid #c8a060;
      border-radius: 8px;
      background: #fff9ee;
      padding: 10px 12px;
      text-align: center;
    }
    .bv-label {
      font-size: 14px;
      font-weight: 700;
      color: #8B0000;
      margin-bottom: 8px;
    }
    .bv-img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 6px;
      display: block;
      margin: 0 auto;
    }
    .bv-placeholder {
      font-size: 13px;
      color: #888;
      padding: 20px;
    }

    /* ── PRINT STYLES ────────────────────────── */
    @media print {
      @page {
        size: A4 portrait;
        margin: 12mm 12mm 12mm 12mm;
      }

      html, body { background: #fff !important; }

      .top-bar { display: none !important; }

      .page-wrap { max-width: 100%; padding: 0; }

      .sabha-doc { padding: 0; }

      .sabha-org-name    { font-size: 18pt; }
      .sabha-org-subtitle{ font-size: 13pt; }
      .sabha-meta        { font-size: 11pt; }

      .sabha-table { font-size: 9.5pt; border: 1.5pt solid #888; }

      .sabha-table thead .header-row th { font-size: 10pt; padding: 5pt 4pt; }

      .sabha-table tbody tr td { padding: 4pt 4pt; }

      .kram-merged-row td { font-size: 11pt; padding: 5pt; }

      .td-kram       { font-size: 11pt; }
      .td-time       { font-size: 9pt;  }
      .td-karyakram  { font-size: 10pt; }
      .td-vigat      { font-size: 9pt;  }
      .td-nam        { font-size: 9pt;  }

      .bv-img { max-height: 160px; }

      .sabha-table { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<!-- Top bar (hidden when printing) -->
<div class="top-bar no-print">
  <div>
    <a href="index.html">← ફોર્મ પર પાછા જાઓ</a>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    ફાઇલ: <strong id="pdf-filename">Sabha.pdf</strong>
    &nbsp;(Print dialog → Save as PDF)
  </div>
  <button class="print-btn" onclick="window.print()">🖨 Print / Save PDF</button>
</div>

<div class="page-wrap">
<div class="sabha-doc">

  <!-- ── Title ── -->
  <div class="sabha-title-block">
    <div class="sabha-org-name"    id="org-name"></div>
    <div class="sabha-org-subtitle" id="org-subtitle"></div>
  </div>

  <!-- ── Meta ── -->
  <div class="sabha-meta">
    <span class="sabha-meta-key">સભા કાર્યક્રમ</span>
    <span class="sabha-meta-val" id="sabha-date-val"></span>
    <span class="sabha-meta-key">સભા સમય</span>
    <span class="sabha-meta-val" id="sabha-time-val"></span>
  </div>

  <!-- ── Main Table ── -->
  <table class="sabha-table">
    <colgroup>
      <col class="col-kram">
      <col class="col-time">
      <col class="col-kary">
      <col class="col-vigat">
      <col class="col-nam">
    </colgroup>
    <thead>
      <tr class="header-row">
        <th>ક્રમ</th>
        <th>સમય</th>
        <th>કાર્યક્રમ</th>
        <th>વિગત</th>
        <th>નામ(રજૂઆત)</th>
      </tr>
      <tr class="kram-merged-row">
        <td colspan="5" id="sabha-kram-cell"></td>
      </tr>
    </thead>
    <tbody id="sabha-tbody">
      <!-- Rows injected by generator.js -->
    </tbody>
    <tfoot>
      <tr class="footer-row">
        <td colspan="2" class="footer-label">સભા સંચાલન પ્રવક્તા</td>
        <td colspan="3">
          <span class="footer-pravakta" id="pravakta-val"></span>
          <br>
          <span class="footer-note-text" id="footer-note"></span>
        </td>
      </tr>
    </tfoot>
  </table>

  <!-- ── Brahmavidhya ── -->
  <div class="bv-section">
    <div class="bv-label" id="bv-label"></div>
    <img id="bv-img" class="bv-img" src="" alt="Brahmavidhya Path" style="display:none">
    <div class="bv-placeholder" id="bv-placeholder">
      (ઇમેજ images/ ફોલ્ડરમાં ઉમેરો — config.json જુઓ)
    </div>
  </div>

</div><!-- end .sabha-doc -->
</div><!-- end .page-wrap -->

<script src="js/generator.js"></script>
</body>
</html>
